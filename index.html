<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PULIFY - Qazanmağa Başla</title>

    <meta name="monetag" content="7ff2cf80bb9e8c55a13cff99a87d4c3f">

    <script src="https://alwingulla.com/88/pfe/current/tag.min.js?z=8874632"></script>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #e0f7fa; --primary: #00bcd4; --green: #4caf50; --dark: #37474f; --white: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--dark); overflow-x: hidden; }
        .page { display: none; padding: 20px 20px 140px 20px; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .active-page { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .app-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; position: sticky; top: 0; background: var(--bg); z-index: 1000; box-sizing: border-box; }
        .wallet-badge { background: var(--white); padding: 8px 15px; border-radius: 12px; font-weight: 800; color: #00796b; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card { width: 100%; background: var(--white); border-radius: 25px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; text-align: center; box-sizing: border-box; }
        .btn-main { border: none; border-radius: 18px; padding: 15px; color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; border-bottom: 4px solid rgba(0,0,0,0.1); }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--green); display: flex; justify-content: space-around; padding: 15px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 1500; }
        .nav-link { color: rgba(255,255,255,0.6); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-link i { font-size: 26px; }
        .nav-link.active { color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-header">
        <div style="font-weight: 900; color: var(--green); font-size: 22px;">PULIFY</div>
        <div class="wallet-badge"><i class="fas fa-wallet"></i> <span id="top-bal">0.00</span> ₼</div>
    </div>

    <div id="home-p" class="page active-page">
        <div class="card" style="background: var(--green); color: white; text-align: left;">
            <h3 id="ann-title">Bildiriş</h3>
            <p id="ann-body">Xoş gəldiniz! Reklam izləyərək qazanmağa başlayın.</p>
        </div>
        
        <div class="card">
            <div style="margin-bottom: 15px; font-size: 14px;">
                <b>💰 Reklam İzlə və Qazan!</b><br>
                <span style="color: #666;">Hər izləmə üçün balansınız artacaq.</span>
            </div>
            <div style="background: #f0fdf4; color: var(--green); padding: 10px; border-radius: 15px; font-weight: bold; margin-bottom: 15px;">Mükafat: +<span id="ad-rew">0.03</span> ₼</div>
            <button class="btn-main" style="background: #00897b;" onclick="watchAd()">REKLAM İZLƏ</button>
        </div>

        <div class="card" style="text-align: left;">
            <h4 style="margin:0 0 10px 0;">Günün Görəvi</h4>
            <a id="task-btn" href="#" target="_blank" onclick="completeTask(event)" class="btn-main" style="background: var(--green);">Görəvi Tamamla</a>
        </div>
    </div>

    <div id="click-p" class="page">
        <div class="card" style="background: var(--green); color: white;">
            <div id="coin-val" style="font-size: 45px; font-weight: 900;">0</div>
            <p>Limit: <span id="click-limit">1000</span></p>
        </div>
        <div onclick="doClick()" style="width: 200px; height: 200px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 70px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: pointer; user-select: none; margin-top: 30px;">💎</div>
    </div>

    <div id="prof-p" class="page">
        <div class="card"><h3>İstifadəçi: <span id="u-id">...</span></h3></div>
        <div class="card">
            <p>Balans: <b id="p-bal">0.00</b> ₼</p>
            <button class="btn-main" style="background: var(--green);" onclick="alert('Minimum çıxarış 5 AZN-dir.')">Çıxarış Et</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-link active" onclick="nav('home-p', this)"><i class="fas fa-home"></i>Ev</div>
        <div class="nav-link" onclick="nav('click-p', this)"><i class="fas fa-hand-pointer"></i>Tıkla</div>
        <div class="nav-link" onclick="nav('prof-p', this)"><i class="fas fa-user-circle"></i>Profil</div>
    </nav>

    <script>
        // FIREBASE QURAŞDIRILMASI
        const firebaseConfig = {
            apiKey: "AIzaSyAf3y4KIjlzQf6CY9yw8S00K6DStiPvNAI",
            authDomain: "pulify-1b39b.firebaseapp.com",
            projectId: "pulify-1b39b",
            databaseURL: "https://pulify-1b39b-default-rtdb.firebaseio.com/",
            storageBucket: "pulify-1b39b.firebasestorage.app",
            messagingSenderId: "873330495196",
            appId: "1:873330495196:web:165ec0858fa409a919ae19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userId = localStorage.getItem('userId') || Math.floor(Math.random() * 1000000);
        localStorage.setItem('userId', userId);

        let balance = parseFloat(localStorage.getItem('balance')) || 0;
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let adReward = 0.03;

        // REKLAM FUNKSİYASI
        function watchAd() {
            if (typeof show_8874632 === 'function') {
                show_8874632().then(() => {
                    addMoney(adReward);
                }).catch(() => {
                    alert("Reklam hələ yüklənməyib, bir neçə saniyə gözləyin.");
                });
            } else {
                alert("Reklam sistemi hazır deyil. Saytın təsdiqlənməsini gözləyin.");
            }
        }

        function addMoney(amount) {
            balance += amount;
            updateUI();
            db.ref('users/' + userId).update({ balance: balance });
            alert("Təbrik! +" + amount + " AZN balansınıza əlavə edildi.");
        }

        function doClick() {
            coins++;
            updateUI();
        }

        function updateUI() {
            document.getElementById('top-bal').innerText = balance.toFixed(2);
            document.getElementById('p-bal').innerText = balance.toFixed(2);
            document.getElementById('coin-val').innerText = coins;
            document.getElementById('u-id').innerText = userId;
            localStorage.setItem('balance', balance);
            localStorage.setItem('coins', coins);
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        window.onload = updateUI;
    </script>
</body>
</html>
