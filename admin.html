<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulify Admin | Full System</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f4f7f6; --dark: #1a2a6c; --accent: #27ae60; --m10: #00b09b; --card: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--dark); color: white; padding: 25px; text-align: center; font-size: 22px; font-weight: bold; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Statistika Kartları */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .stat-item i { font-size: 24px; color: var(--dark); margin-bottom: 8px; }
        .stat-item b { display: block; font-size: 18px; color: #333; }

        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Ödəniş Siyahısı */
        .payout-box { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-done { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Girişlər */
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn-main { width: 100%; background: var(--dark); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Alt Menyu */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); border-top: 1px solid #eee; }
        .nav-item { color: #ccc; font-size: 22px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; }
        .nav-item.active { color: var(--dark); transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="header">Pulify Admin Panel</div>

    <div id="home" class="section active-section">
        <div class="stats-grid">
            <div class="stat-item"><i class="fas fa-users"></i><span>İstifadəçi</span><b id="st-users">0</b></div>
            <div class="stat-item"><i class="fas fa-link"></i><span>Referal</span><b id="st-refs">0</b></div>
            <div class="stat-item"><i class="fas fa-play-circle"></i><span>Reklam</span><b id="st-ads">0</b></div>
            <div class="stat-item"><i class="fas fa-wallet"></i><span>Ümumi Balans</span><b id="st-money">0 ₼</b></div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-bullhorn" style="color:#f39c12"></i> Global Bildiriş</h3>
            <input type="text" id="msg-title" placeholder="Başlıq">
            <textarea id="msg-body" rows="2" placeholder="Mesajınız..."></textarea>
            <button class="btn-main" onclick="sendGlobalMsg()">Bütün İstifadəçilərə Göndər</button>
        </div>
    </div>

    <div id="payments" class="section">
        <div class="card" style="border-top: 5px solid var(--m10);">
            <h3 style="color: var(--m10);"><i class="fas fa-mobile-alt"></i> m10 İstəkləri</h3>
            <div id="m10-list">Yüklənir...</div>
        </div>
        <div class="card" style="border-top: 5px solid var(--card);">
            <h3 style="color: var(--card);"><i class="fas fa-credit-card"></i> Kart İstəkləri</h3>
            <div id="card-list">Yüklənir...</div>
        </div>
    </div>

    <div id="promo" class="section">
        <div class="card">
            <h3><i class="fas fa-tags"></i> Promokod Yarat</h3>
            <input type="text" id="p-code" placeholder="KOD ADI">
            <input type="number" id="p-limit" placeholder="İstifadə sayı (Limit)">
            <input type="number" step="0.01" id="p-reward" placeholder="Məbləğ (₼)">
            <button class="btn-main" onclick="createPromo()" style="background:#f39c12">Kodu Aktiv Et</button>
        </div>
    </div>

    <div id="settings" class="section">
        <div class="card">
            <h3><i class="fas fa-cog"></i> Sistem Ayarları</h3>
            <label>Reklam İzləmə (₼)</label><input type="number" step="0.001" id="set-ad">
            <label>Çarx Qazancı (₼)</label><input type="number" step="0.001" id="set-spin">
            <label>Minimum Çıxarış (₼)</label><input type="number" id="set-min">
            <label>Coin Kursu (1000 Coin = ? ₼)</label><input type="number" step="0.01" id="set-coin">
            <button class="btn-main" onclick="saveSettings()" style="background: var(--accent)">Yadda Saxla</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-chart-bar"></i><span>Statistika</span></div>
        <div class="nav-item" onclick="showTab('payments', this)"><i class="fas fa-wallet"></i><span>Ödəniş</span></div>
        <div class="nav-item" onclick="showTab('promo', this)"><i class="fas fa-ticket-alt"></i><span>Promo</span></div>
        <div class="nav-item" onclick="showTab('settings', this)"><i class="fas fa-user-cog"></i><span>Ayarlar</span></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAf3y4KIjlzQf6CY9yw8S00K6DStiPvNAI",
            authDomain: "pulify-1b39b.firebaseapp.com",
            projectId: "pulify-1b39b",
            databaseURL: "https://pulify-1b39b-default-rtdb.firebaseio.com/",
            storageBucket: "pulify-1b39b.firebasestorage.app",
            messagingSenderId: "873330495196",
            appId: "1:873330495196:web:165ec0858fa409a919ae19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showTab(tabId, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(tabId).classList.add('active-section');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // CANLI STATİSTİKA
        db.ref('users').on('value', s => {
            let ads = 0, money = 0, refs = 0;
            s.forEach(u => {
                const d = u.val();
                ads += (d.adsWatched || 0);
                money += (d.balance || 0);
                if(d.referredBy) refs++;
            });
            document.getElementById('st-users').innerText = s.numChildren();
            document.getElementById('st-ads').innerText = ads;
            document.getElementById('st-money').innerText = money.toFixed(2) + " ₼";
            document.getElementById('st-refs').innerText = refs;
        });

        // ÖDƏNİŞLƏRİ AYIRARAQ GƏTİR
        db.ref('payouts').on('value', s => {
            const mList = document.getElementById('m10-list');
            const cList = document.getElementById('card-list');
            mList.innerHTML = ""; cList.innerHTML = "";
            s.forEach(item => {
                const d = item.val();
                const html = `<div class="payout-box">
                    <div><b>${d.number}</b><br><small>${d.amount} ₼ (${d.name || 'Adsız'})</small></div>
                    <button class="btn-done" onclick="complete('${item.key}')">Ödə</button>
                </div>`;
                if(d.method === 'm10') mList.innerHTML += html;
                else cList.innerHTML += html;
            });
        });

        // AYARLARI YÜKLƏ
        db.ref('settings').on('value', s => {
            const d = s.val() || {};
            document.getElementById('set-ad').value = d.adReward || 0.03;
            document.getElementById('set-spin').value = d.spinReward || 0.01;
            document.getElementById('set-min').value = d.minWithdraw || 10;
            document.getElementById('set-coin').value = d.coinRate || 0.10;
        });

        function saveSettings() {
            db.ref('settings').update({
                adReward: document.getElementById('set-ad').value,
                spinReward: document.getElementById('set-spin').value,
                minWithdraw: document.getElementById('set-min').value,
                coinRate: document.getElementById('set-coin').value
            }).then(() => alert("Ayarlar bazada yeniləndi!"));
        }

        function sendGlobalMsg() {
            const t = document.getElementById('msg-title').value;
            const b = document.getElementById('msg-body').value;
            if(t && b) {
                db.ref('notifications').set({ title: t, body: b, time: Date.now() })
                .then(() => { alert("Bildiriş göndərildi!"); document.getElementById('msg-body').value = ""; });
            }
        }

        function createPromo() {
            const code = document.getElementById('p-code').value;
            const limit = document.getElementById('p-limit').value;
            const reward = document.getElementById('p-reward').value;
            if(code && limit && reward) {
                db.ref('promocodes/' + code).set({ limit, reward, used: 0 }).then(() => alert("Promokod aktivdir!"));
            }
        }

        function complete(id) {
            if(confirm("Silinsin?")) db.ref('payouts/' + id).remove();
        }
    </script>
</body>
</html>
